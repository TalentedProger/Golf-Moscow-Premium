kind = "web"
previewPath = "/"
title = "Moscow Golf Club"
version = "1.0.0"
id = "artifacts/golf-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21514

[services.development]
run = "pnpm --filter @workspace/golf-club run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golf-club", "run", "build" ]
publicDir = "artifacts/golf-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21514"
BASE_PATH = "/"
